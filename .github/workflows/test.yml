name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    name: Playwright smoke
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # v1.0.26 (C11 · audit Bug 48) — the Bayern composeLegalContext SHA is a
      # P0 invariant (runbook-classified) but was NOT gated in CI. Run it
      # BEFORE the build so any drift fails fast and cheap.
      - name: Bayern SHA invariant
        run: npm run verify:bayern-sha

      # phase-c/legal-correctness — strict citation gate: corpus integrity +
      # every cited §/Art. resolves + law-version currency (data_current_as_of
      # not older than a known last_amendment). Fast static check; runs before
      # the expensive browser install + build so legal-data drift fails cheap.
      # Stricter than the report-mode verify:citations in prebuild — also blocks
      # existence/role findings (currently zero).
      - name: Citation strict gate (integrity + existence + law-version)
        run: npm run verify:citations:strict

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build
        run: npm run build
        env:
          # CI build needs *something* to satisfy import.meta.env reads;
          # tests stub the actual network calls so production keys are
          # never sent. Configure real values via repository secrets if
          # the build ever needs to call a live API at compile time.
          #
          # fix/ci-build (2026-06-10) — TWO load-bearing values here:
          #
          # 1. VITE_SUPABASE_URL MUST be a localhost URL: supabase-js v2
          #    derives its storage key from the URL's first hostname
          #    label (sb-<ref>-auth-token), and every smoke spec seeds
          #    'sb-localhost-auth-token' (tests/smoke/helpers/auth.ts).
          #    The previous 'https://stub.supabase.co' produced
          #    sb-stub-auth-token → every seeded spec ran logged-out.
          #
          # 2. SKIP_LEGAL_CONFIG_CHECK=1 — verify:legal-config (prebuild,
          #    added 549b48b on 2026-05-08) requires 8 VITE_LEGAL_* vars
          #    that exist only in Vercel/.env.local. This is a non-deploy
          #    metadata build, which is exactly the script's documented
          #    bypass case. THIS missing line is what kept CI red at the
          #    Build step from 2026-05-08 to 2026-06-10 (runs #51-#210).
          #
          # Guarded by scripts/verify-ci-env.mjs (prebuild audit:ci-env).
          VITE_SUPABASE_URL: 'http://localhost:54321'
          VITE_SUPABASE_ANON_KEY: 'stub-anon-key'
          SKIP_LEGAL_CONFIG_CHECK: '1'

      # v1.0.25 — PDF render gate (Band 11's missing "5th gate").
      # Renders the fixture PDFs through buildExportPdf and asserts no
      # ligature corruption, DE/EN parity, and (v1.0.25 Bug 26) no
      # fabricated "§ NN BauO {UPPERCASE}" stub-state citations.
      - name: PDF smoke (render + Bug 26 fabrication guard)
        run: npm run smoke:pdf-text

      # v1.0.26 (C11) — 16-state PDF render matrix. Renders one plain-residential
      # T-01 per Bundesland + bayern-t03-verified × DE/EN and asserts no
      # fabricated "§ NN BauO {code}" citation, no Bayern-leak token in
      # non-Bayern PDFs, DE/EN parity, no ligature corruption, real §/Art. for
      # substantive states, honest "in Vorbereitung" for stubs.
      - name: PDF matrix (16-state · C11)
        run: npm run smoke:pdf-matrix

      # v1.0.26 (audit Band 11) — citation/source smoke; was manual-only.
      - name: Citations smoke
        run: npm run smoke:citations

      # v1.0.29.2 — chat-UX decision logic (auto-scroll gate, chips visibility,
      # spine speaking-now source, dynamic input-zone reserve math).
      - name: Chat-UX smoke
        run: npm run smoke:chat-ux

      # phase-c/legal-correctness — the architect-flow smoke (invite parsing,
      # role promotion, verification rollup, web↔PDF Section-05 convergence,
      # composeLegalDomains) was NOT in CI, so a stale Sachsen assertion went
      # silently red for several sprints after Phase B flipped Sachsen
      # substantive. Wire it in so an architect-flow regression fails CI.
      - name: Architect-flow smoke
        run: npm run smoke:architect

      # fix/meta-sweep-pre-t06 item 6 — the under-wired guard deficit. These
      # ten gates existed but ran on per-commit convention only; the repo's
      # own history shows exactly what happens to unwired guards (the Sachsen
      # architect assertion and the smokeWalk thin-state net both sat silently
      # red until someone looked). ~9 s total; deliberately CI-only, NOT
      # prebuild (kept fast pending the orchestrator consolidation).
      - name: Guard smokes (previously manual-only)
        run: npm run smoke:guards

      - name: Run Playwright
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
