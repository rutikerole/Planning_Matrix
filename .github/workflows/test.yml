name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    name: Playwright smoke
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build
        run: npm run build
        env:
          # CI build needs *something* to satisfy import.meta.env reads;
          # tests stub the actual network calls so production keys are
          # never sent. Configure real values via repository secrets if
          # the build ever needs to call a live API at compile time.
          VITE_SUPABASE_URL: 'https://stub.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'stub-anon-key'

      - name: Run Playwright
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
