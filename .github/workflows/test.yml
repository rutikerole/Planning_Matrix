name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    name: Playwright smoke
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # v1.0.26 (C11 · audit Bug 48) — the Bayern composeLegalContext SHA is a
      # P0 invariant (runbook-classified) but was NOT gated in CI. Run it
      # BEFORE the build so any drift fails fast and cheap.
      - name: Bayern SHA invariant
        run: npm run verify:bayern-sha

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build
        run: npm run build
        env:
          # CI build needs *something* to satisfy import.meta.env reads;
          # tests stub the actual network calls so production keys are
          # never sent. Configure real values via repository secrets if
          # the build ever needs to call a live API at compile time.
          VITE_SUPABASE_URL: 'https://stub.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'stub-anon-key'

      # v1.0.25 — PDF render gate (Band 11's missing "5th gate").
      # Renders the fixture PDFs through buildExportPdf and asserts no
      # ligature corruption, DE/EN parity, and (v1.0.25 Bug 26) no
      # fabricated "§ NN BauO {UPPERCASE}" stub-state citations.
      - name: PDF smoke (render + Bug 26 fabrication guard)
        run: npm run smoke:pdf-text

      # v1.0.26 (C11) — 16-state PDF render matrix. Renders one plain-residential
      # T-01 per Bundesland + bayern-t03-verified × DE/EN and asserts no
      # fabricated "§ NN BauO {code}" citation, no Bayern-leak token in
      # non-Bayern PDFs, DE/EN parity, no ligature corruption, real §/Art. for
      # substantive states, honest "in Vorbereitung" for stubs.
      - name: PDF matrix (16-state · C11)
        run: npm run smoke:pdf-matrix

      # v1.0.26 (audit Band 11) — citation/source smoke; was manual-only.
      - name: Citations smoke
        run: npm run smoke:citations

      # v1.0.29.2 — chat-UX decision logic (auto-scroll gate, chips visibility,
      # spine speaking-now source, dynamic input-zone reserve math).
      - name: Chat-UX smoke
        run: npm run smoke:chat-ux

      - name: Run Playwright
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
