<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <title>Das Atelier</title>
  <desc>Axonometrische Zeichnung eines Zeichentisches: Tisch, Transparentpapier, Federhalter, Pläne, Hauptbuch, Kaffeetasse.</desc>

  <style>
    @keyframes pm-pen-trace {
      0%   { stroke-dashoffset: 60; opacity: 0; }
      8%   { opacity: 0.85; }
      35%  { stroke-dashoffset: 0; opacity: 0.85; }
      78%  { stroke-dashoffset: 0; opacity: 0.85; }
      88%  { opacity: 0; stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 60; opacity: 0; }
    }
    @keyframes pm-pen-glide {
      0%   { transform: translate(-46px, -2px); }
      8%   { transform: translate(-46px, -2px); }
      35%  { transform: translate(0, 0); }
      78%  { transform: translate(0, 0); }
      88%  { transform: translate(0, 0); opacity: 1; }
      100% { transform: translate(-46px, -2px); opacity: 1; }
    }
    @keyframes pm-steam {
      0%   { opacity: 0; transform: translate(0, 4px); }
      40%  { opacity: 0.55; transform: translate(-1px, 0); }
      80%  { opacity: 0; transform: translate(-2px, -4px); }
      100% { opacity: 0; transform: translate(0, 4px); }
    }
    .pm-scale-line {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: pm-pen-trace 6s ease-in-out infinite;
    }
    .pm-pen-group {
      transform-origin: 215px 192px;
      animation: pm-pen-glide 6s ease-in-out infinite;
    }
    .pm-steam {
      transform-origin: 252px 145px;
      animation: pm-steam 5s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .pm-scale-line { animation: none; stroke-dashoffset: 0; }
      .pm-pen-group { animation: none; transform: none; }
      .pm-steam { animation: none; opacity: 0.4; }
    }
  </style>

  <g opacity="0.95">
    <!-- Drafting table top — axonometric parallelogram, slight wobble baked in -->
    <path d="M 60 220 L 260 220 L 280 160 L 80 160 Z" stroke-opacity="0.95" />
    <!-- Inner edge / paper substrate hint -->
    <path d="M 64 218 L 256 218" stroke-opacity="0.35" />

    <!-- Table legs — 4 verticals -->
    <path d="M 60 220 L 58 282" />
    <path d="M 260 220 L 262 282" />
    <path d="M 80 160 L 78 222" stroke-opacity="0.55" />
    <path d="M 280 160 L 282 222" stroke-opacity="0.55" />
    <!-- Cross-brace at the back -->
    <path d="M 80 195 L 280 195" stroke-opacity="0.35" />

    <!-- Tracing paper sheet on the table — slight curl front-right -->
    <path d="M 124 205 L 215 198 L 222 174 L 132 180 Z" stroke-opacity="0.85" />
    <!-- Curl on the front-right corner of the sheet -->
    <path d="M 215 198 Q 220 200 222 196" stroke-opacity="0.55" />
    <!-- A faint title-block rectangle in the lower-right of the sheet -->
    <path d="M 188 202 L 213 200 L 215 191 L 190 193 Z" stroke-opacity="0.25" />

    <!-- The 1 cm scale line — drawn in a 6s loop by the pen -->
    <line
      class="pm-scale-line"
      x1="155" y1="192" x2="215" y2="188"
      stroke-opacity="0.95"
      stroke-width="1"
    />
    <!-- Tick marks at the ends of the scale line — drawn after the line -->
    <path d="M 155 189 L 155 195 M 215 185 L 215 191" stroke-opacity="0.55" />
    <!-- "1 cm" label below the line, very small -->
    <text x="178" y="208" font-family="Georgia, 'Instrument Serif', serif" font-style="italic" font-size="7" fill="currentColor" stroke="none" fill-opacity="0.55">1 cm</text>

    <!-- Fountain pen — group glides toward end of scale line -->
    <g class="pm-pen-group">
      <!-- Pen body -->
      <path d="M 218 190 L 268 152 L 274 156 L 222 195 Z" stroke-opacity="0.85" />
      <!-- Cap ring -->
      <path d="M 250 168 L 256 173" stroke-opacity="0.55" />
      <!-- Pen nib -->
      <path d="M 218 190 L 215 192 L 220 193 Z" stroke-opacity="0.95" />
      <!-- Clip on the cap end -->
      <path d="M 268 152 L 271 148 L 274 152" stroke-opacity="0.55" />
    </g>

    <!-- Rolled-up plans, back-left — three cylinders in a loose stack -->
    <g stroke-opacity="0.7">
      <!-- Roll 1 — front -->
      <ellipse cx="100" cy="173" rx="4" ry="2.4" />
      <line x1="100" y1="170.6" x2="148" y2="166" />
      <line x1="100" y1="175.4" x2="148" y2="171" />
      <ellipse cx="148" cy="168.5" rx="3.8" ry="2.4" stroke-opacity="0.55" />
      <!-- Roll 2 — back -->
      <ellipse cx="98" cy="167" rx="3.6" ry="2.2" />
      <line x1="98" y1="164.8" x2="142" y2="160" />
      <line x1="98" y1="169.2" x2="142" y2="164" />
      <ellipse cx="142" cy="162" rx="3.4" ry="2.2" stroke-opacity="0.55" />
      <!-- Roll 3 — leaning across -->
      <ellipse cx="96" cy="178" rx="3" ry="1.8" stroke-opacity="0.55" />
      <line x1="96" y1="176.2" x2="135" y2="172" stroke-opacity="0.55" />
      <line x1="96" y1="179.8" x2="135" y2="175.6" stroke-opacity="0.55" />
    </g>

    <!-- Open ledger, back-right — two pages forming an open spread, seen from above -->
    <g stroke-opacity="0.65">
      <!-- Left page -->
      <path d="M 224 184 L 244 181 L 246 168 L 226 171 Z" />
      <!-- Right page -->
      <path d="M 244 181 L 264 178 L 266 166 L 246 168 Z" />
      <!-- Spine -->
      <line x1="244" y1="181" x2="246" y2="168" stroke-opacity="0.4" />
      <!-- A few hand-written rule lines on the left page -->
      <line x1="229" y1="174" x2="241" y2="172.5" stroke-opacity="0.3" />
      <line x1="229" y1="177" x2="240" y2="175.5" stroke-opacity="0.3" />
      <line x1="229" y1="180" x2="238" y2="178.5" stroke-opacity="0.3" />
    </g>

    <!-- Coffee cup, back-right corner — small cylinder + saucer + handle -->
    <g stroke-opacity="0.7">
      <!-- Saucer ellipse -->
      <ellipse cx="252" cy="160" rx="9" ry="3" stroke-opacity="0.4" />
      <!-- Cup top -->
      <ellipse cx="252" cy="153" rx="5.5" ry="2" />
      <!-- Cup body -->
      <path d="M 246.5 153 L 247.5 159 M 257.5 153 L 256.5 159" />
      <path d="M 247.5 159 Q 252 160.4 256.5 159" />
      <!-- Handle -->
      <path d="M 257 154 Q 261 154.5 260 158" stroke-opacity="0.55" />
    </g>
    <!-- Steam curl, gentle -->
    <g class="pm-steam" stroke-opacity="0.5">
      <path d="M 250 148 Q 252 145 250 142 Q 248 139 250 137" />
    </g>

    <!-- Subtle ground-shadow hairline under the table -->
    <path d="M 64 286 L 280 286" stroke-opacity="0.18" />
  </g>
</svg>
