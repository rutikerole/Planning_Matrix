    <!-- Hero AVIF preload — kicks LCP load before JS parses.
         Mobile and desktop variants picked by media query. -->
    <link
      rel="preload"
      as="image"
      type="image/avif"
      href="/images/hero-rooftop-900.avif"
      media="(max-width: 900px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      type="image/avif"
      href="/images/hero-rooftop-1600.avif"
      media="(min-width: 901px)"
      fetchpriority="high"
    />

    <!-- Phase 8 — self-hosted brand fonts (DSGVO).
       * Removed fonts.googleapis.com + fonts.gstatic.com per LG München
       * I 3 O 17493/20 (20.01.2022). @font-face declarations live in
       * src/styles/globals.css and reference /fonts/*.woff2 from this
       * origin only. Preload the Inter variable font so the wizard's
       * first paint isn't a FOIT. -->
    <link
      rel="preload"
      href="/fonts/Inter-Variable-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Inline a tiny FOUC-killer: keeps body transparent until first paint commits. -->
    <style>
